allocator_enabled: false
allocator_top_n: 3
data_source: baostock
enable_debate: true
index_codes:
- 000001.SH
- 399001.SZ
- 399006.SZ
- 000300.SH
initial_capital: 100000.0
investment_model: momentum
investment_model_config: invest/models/configs/momentum_v1.yaml
llm_max_retries: 2
llm_timeout: 60
max_debate_rounds: 1
max_positions: 5
max_risk_discuss_rounds: 1
max_stocks: 77
min_history_days: 150
model_routing_agent_override_enabled: false
model_routing_agent_override_max_gap: 0.18
model_routing_allowed_models:
- momentum
- mean_reversion
- value_quality
- defensive_low_vol
model_routing_enabled: true
model_routing_mode: rule
model_routing_policy:
  bear_above_ma20_ratio: 0.45
  bear_avg_change_20d: -3.0
  bull_above_ma20_ratio: 0.55
  bull_avg_change_20d: 3.0
  default_regime: oscillation
  high_volatility_threshold: 0.028
  index_bear_change_20d: -2.0
  index_bull_change_20d: 2.0
  strong_breadth_threshold: 0.58
  weak_breadth_threshold: 0.42
model_switch_cooldown_cycles: 2
model_switch_hysteresis_margin: 0.08
model_switch_min_confidence: 0.6
position_size_pct: 0.2
simulation_days: 30
stop_on_freeze: true
web_rate_limit_enabled: true
web_rate_limit_heavy_max: 5
web_rate_limit_read_max: 120
web_rate_limit_window_sec: 60
web_rate_limit_write_max: 20
