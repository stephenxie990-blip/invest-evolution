name: momentum_v1
kind: momentum
params:
  candidate_pool_size: 100
  top_n: 5
  max_positions: 4
  cash_reserve: 0.2
  stop_loss_pct: 0.05
  take_profit_pct: 0.15
  trailing_pct: 0.1
  position_size: 0.2
  ma_short: 5
  ma_long: 20
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  signal_threshold: 0.61
risk:
  stop_loss_pct: 0.05
  take_profit_pct: 0.15
  trailing_pct: 0.1
execution:
  initial_capital: 100000
  commission_rate: 0.00025
  stamp_tax_rate: 0.0005
  slippage_rate: 0.002
summary_scoring:
  weights:
    change_5d: 0.15
    change_20d: 0.15
    ma_bull: 0.2
    ma_bear: -0.1
    rsi_mid: 0.15
    rsi_oversold: 0.05
    rsi_overbought: -0.1
    macd:
      gold_cross: 0.2
      bullish: 0.1
      neutral: 0.0
      bearish: -0.1
      death_cross: -0.15
    bb_low: 0.15
    bb_high: -0.1
  logic:
    ma_bull_ratio: 1.01
    ma_bear_ratio: 0.99
  bands:
    change_5d_norm: 10.0
    change_20d_norm: 20.0
    rsi_mid_low: 40.0
    rsi_mid_high: 60.0
    rsi_oversold: 30.0
    rsi_overbought: 70.0
    bb_low: 0.3
    bb_high: 0.8
market_hints:
  avg_volatility_gt: 0.03
  market_breadth_lt: 0.45
  above_ma20_ratio_lt: 0.4
market_regime:
  bull_avg_change_20d: 3.0
  bull_above_ma20_ratio: 0.55
  bear_avg_change_20d: -3.0
  bear_above_ma20_ratio: 0.45
  default_regime: oscillation
benchmark:
  risk_free_rate: 0.03
  criteria:
    excess_return: 0.0
    sharpe_ratio: 1.0
    max_drawdown: 15.0
    calmar_ratio: 1.5
    win_rate: 0.45
    profit_loss_ratio: 1.5
    monthly_turnover: 3.0
risk_policy:
  clamps:
    stop_loss_pct:
      min: 0.02
      max: 0.15
    take_profit_pct:
      min: 0.05
      max: 0.5
    position_size:
      min: 0.05
      max: 0.3
  dynamic_stop:
    atr_period: 14
    stop_loss_atr_multiplier: 2.0
    take_profit_atr_multiplier: 3.0
    trailing_atr_multiplier: 1.5
  portfolio:
    max_drawdown_to_reduce: 0.08
    max_drawdown_to_close: 0.12
    market_ma_period: 60
    bull_threshold: 1.05
    bear_threshold: 0.95
    max_industry_pct: 0.3
    max_correlation: 0.6
  emergency:
    single_stock_crash_pct: -7.0
    rapid_loss_pct: -5.0
    rapid_loss_days: 3
    crash_severity_divisor: 15.0
    tighten_stop_severity_threshold: 0.6
    rapid_loss_severity_divisor: 10.0
    reduce_all_severity_threshold: 0.7
    all_positions_red_severity: 0.5
train:
  freeze_total_cycles: 10
  freeze_profit_required: 7
  max_losses_before_optimize: 3
  auto_apply_mutation: false
  freeze_gate:
    avg_return_gt: 0.0
    avg_sharpe_gte: 0.8
    avg_max_drawdown_lt: 15.0
    benchmark_pass_rate_gte: 0.6
evaluation_policy:
  weights:
    signal_accuracy: 0.3
    timing: 0.3
    risk_control: 0.4
  defaults:
    empty_signal_score: 0.5
    empty_timing_score: 0.5
    empty_risk_score: 0.5
    risk_control_base_score: 0.3
  thresholds:
    signal_accuracy_low: 0.4
    timing_low: 0.4
    risk_control_low: 0.4
    win_rate_low: 0.4
    win_rate_high: 0.6
    high_trade_count: 20
review_policy:
  confidence:
    default: 0.5
  param_clamps:
    cash_reserve:
      min: 0.0
      max: 0.8
    trailing_pct:
      min: 0.03
      max: 0.2
  agent_weight:
    min: 0.3
    max: 2.0
    default: 1.0
    min_traded_count: 3
    formula_base: 0.5
  fallback:
    strategy:
      win_rate_low: 0.4
      avg_return_low: -3.0
      confidence: 0.4
    evo:
      win_rate_conservative: 0.35
      win_rate_aggressive: 0.65
      conservative_adjustments:
        stop_loss_pct: 0.03
        position_size: 0.15
      aggressive_adjustments:
        position_size: 0.25
      confidence: 0.4
agent_weights:
  trend_hunter: 1.0
  contrarian: 1.0
context:
  style: concise
