limit_req_zone $binary_remote_addr zone=invest_api_read:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=invest_api_write:10m rate=2r/s;
upstream invest_evolution_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 2m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    send_timeout 300s;

    # /healthz 只表示 stateless Web/API upstream 健康。
    # 若需要判断 Commander runtime 是否在线、锁文件是否存在，请查询 /api/status。
    location = /healthz {
        proxy_pass http://invest_evolution_app/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location /api/train {
        limit_req zone=invest_api_write burst=5 nodelay;
        proxy_pass http://invest_evolution_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/data/download {
        limit_req zone=invest_api_write burst=3 nodelay;
        proxy_pass http://invest_evolution_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /api/* 由无状态 Web/API 进程处理；runtime 状态通过 state/artifact facade 投影。
    location /api/ {
        limit_req zone=invest_api_read burst=30 nodelay;
        proxy_pass http://invest_evolution_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://invest_evolution_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
