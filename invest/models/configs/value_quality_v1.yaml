name: value_quality_v1
kind: value_quality
params:
  candidate_pool_size: 100
  top_n: 5
  max_positions: 4
  cash_reserve: 0.25
  stop_loss_pct: 0.06
  take_profit_pct: 0.18
  trailing_pct: 0.08
  position_size: 0.2
  max_pe_ttm: 30
  max_pb: 3.0
  min_roe: 8.0
  min_market_cap: 0.0
  min_value_quality_score: 0.25
risk:
  stop_loss_pct: 0.06
  take_profit_pct: 0.18
  trailing_pct: 0.08
execution:
  initial_capital: 100000
  commission_rate: 0.00025
  stamp_tax_rate: 0.0005
  slippage_rate: 0.002
summary_scoring:
  weights:
    change_5d: 0.15
    change_20d: 0.15
    ma_bull: 0.20
    ma_bear: -0.10
    rsi_mid: 0.15
    rsi_oversold: 0.05
    rsi_overbought: -0.10
    macd:
      gold_cross: 0.20
      bullish: 0.10
      neutral: 0.00
      bearish: -0.10
      death_cross: -0.15
    bb_low: 0.15
    bb_high: -0.10
  logic:
    ma_bull_ratio: 1.01
    ma_bear_ratio: 0.99
  bands:
    change_5d_norm: 10.0
    change_20d_norm: 20.0
    rsi_mid_low: 40.0
    rsi_mid_high: 60.0
    rsi_oversold: 30.0
    rsi_overbought: 70.0
    bb_low: 0.30
    bb_high: 0.80

market_hints:
  avg_volatility_gt: 0.03
  market_breadth_lt: 0.40

market_regime:
  bull_avg_change_20d: 3.0
  bull_above_ma20_ratio: 0.55
  bear_avg_change_20d: -3.0
  bear_above_ma20_ratio: 0.45
  default_regime: oscillation

benchmark:
  risk_free_rate: 0.03
  criteria:
    excess_return: 0.0
    sharpe_ratio: 0.8
    max_drawdown: 15.0
    calmar_ratio: 1.0
    win_rate: 0.4
    profit_loss_ratio: 1.2
    monthly_turnover: 2.5
risk_policy:
  clamps:
    stop_loss_pct:
      min: 0.03
      max: 0.12
    take_profit_pct:
      min: 0.08
      max: 0.3
    position_size:
      min: 0.05
      max: 0.3
  dynamic_stop:
    atr_period: 14
    stop_loss_atr_multiplier: 2.0
    take_profit_atr_multiplier: 2.8
    trailing_atr_multiplier: 1.4
  portfolio:
    max_drawdown_to_reduce: 0.08
    max_drawdown_to_close: 0.12
    market_ma_period: 60
    bull_threshold: 1.05
    bear_threshold: 0.95
    max_industry_pct: 0.3
    max_correlation: 0.6
  emergency:
    single_stock_crash_pct: -7.0
    rapid_loss_pct: -5.0
    rapid_loss_days: 3
    crash_severity_divisor: 15.0
    tighten_stop_severity_threshold: 0.6
    rapid_loss_severity_divisor: 10.0
    reduce_all_severity_threshold: 0.7
    all_positions_red_severity: 0.5
evaluation_policy:
  weights:
    signal_accuracy: 0.3
    timing: 0.25
    risk_control: 0.45
  defaults:
    empty_signal_score: 0.5
    empty_timing_score: 0.5
    empty_risk_score: 0.55
    risk_control_base_score: 0.3
  thresholds:
    signal_accuracy_low: 0.4
    timing_low: 0.4
    risk_control_low: 0.45
    win_rate_low: 0.38
    win_rate_high: 0.6
    high_trade_count: 14
train:
  freeze_total_cycles: 10
  freeze_profit_required: 7
  max_losses_before_optimize: 3
  auto_apply_mutation: false
  promotion_gate:
    min_samples: 3
    research_feedback:
      min_sample_count: 5
      blocked_biases: [tighten_risk, recalibrate_probability]
      max_brier_like_direction_score: 0.25
      horizons:
        T+20:
          min_hit_rate: 0.45
          max_invalidation_rate: 0.30
          min_interval_hit_rate: 0.40
    regime_validation:
      min_distinct_regimes: 2
      min_samples_per_regime: 1
      min_avg_return_pct: 0.0
      min_win_rate: 0.40
      min_benchmark_pass_rate: 0.40
      max_dominant_regime_share: 0.75
    return_objectives:
      min_avg_return_pct: 0.0
      min_median_return_pct: 0.0
      min_cumulative_return_pct: 0.0
      min_win_rate: 0.50
      max_loss_share: 0.50
      min_benchmark_pass_rate: 0.50
    candidate_ab:
      required_when_candidate_present: true
      require_candidate_outperform_active: true
      min_return_lift_pct: 0.0
      min_strategy_score_lift: 0.0
      min_benchmark_lift: 0.0
  freeze_gate:
    avg_return_gt: 0.0
    avg_sharpe_gte: 0.8
    avg_max_drawdown_lt: 15.0
    benchmark_pass_rate_gte: 0.6
    governance:
      max_candidate_pending_count: 0
      max_override_pending_count: 0
      max_active_candidate_drift_rate: 0.0
  quality_gate_matrix:
    review:
      min_strategy_score: 0.45
      min_benchmark_pass_rate: 0.05
      max_drawdown_pct: 18.0
    routing:
      min_score: 0.0
      min_avg_return_pct: 0.0
      min_avg_strategy_score: 0.0
      min_benchmark_pass_rate: 0.0
      max_avg_drawdown: 15.0
      allowed_deployment_stages: [active]
    promotion:
      max_pending_cycles: 3
      max_pending_candidates: 1
      max_override_cycles: 2
      allowed_deployment_stages: [candidate]
review_policy:
  confidence:
    default: 0.5
  param_clamps:
    cash_reserve:
      min: 0.0
      max: 0.8
    trailing_pct:
      min: 0.03
      max: 0.2
  agent_weight:
    min: 0.3
    max: 2.0
    default: 1.0
    min_traded_count: 3
    formula_base: 0.5
  fallback:
    strategy:
      win_rate_low: 0.4
      avg_return_low: -3.0
      confidence: 0.4
    evo:
      win_rate_conservative: 0.35
      win_rate_aggressive: 0.65
      conservative_adjustments:
        stop_loss_pct: 0.03
        position_size: 0.15
      aggressive_adjustments:
        position_size: 0.25
      confidence: 0.4

agent_weights:
  trend_hunter: 0.9
  contrarian: 1.0
context:
  style: concise
scoring:
  weights:
    pe: 0.25
    pb: 0.2
    roe: 0.3
    market_cap: 0.1
    rsi_band: 0.08
    change_20d_band: 0.05
    low_volatility: 0.05
  bands:
    rsi_low: 40.0
    rsi_high: 65.0
    change_20d_low: -10.0
    change_20d_high: 15.0
    low_volatility_threshold: 0.04
mutation_space:
  params:
    stop_loss_pct:
      min: 0.03
      max: 0.12
    take_profit_pct:
      min: 0.08
      max: 0.3
    position_size:
      min: 0.05
      max: 0.3
    max_pe_ttm:
      min: 10
      max: 60
    max_pb:
      min: 1.0
      max: 6.0
    min_roe:
      min: 3.0
      max: 20.0
    min_value_quality_score:
      min: 0.05
      max: 0.6
  scoring:
    weights:
      pe:
        min: 0.05
        max: 0.4
      pb:
        min: 0.05
        max: 0.35
      roe:
        min: 0.1
        max: 0.5
      market_cap:
        min: 0.0
        max: 0.2
      rsi_band:
        min: 0.0
        max: 0.2
      change_20d_band:
        min: 0.0
        max: 0.2
      low_volatility:
        min: 0.0
        max: 0.2
    bands:
      rsi_low:
        min: 20.0
        max: 55.0
      rsi_high:
        min: 55.0
        max: 80.0
      change_20d_low:
        min: -20.0
        max: 0.0
      change_20d_high:
        min: 5.0
        max: 30.0
      low_volatility_threshold:
        min: 0.01
        max: 0.1
