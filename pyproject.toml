[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "invest-evolution"
version = "1.0.0"
description = "Investment Evolution System (Commander fused runtime)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "numpy>=1.26",
  "pandas>=2.2",
  "PyYAML>=6.0",
  "litellm>=1.52",
  "baostock>=0.8.9",
  "tushare>=1.4.0",
  "rank-bm25>=0.2.2",
  "flask>=3.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
invest-commander = "commander:main"
invest-train = "train:train_main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
pythonpath = ["."]
addopts = "-q"

[tool.setuptools]
py-modules = [
  "agents",
  "brain_bridge",
  "brain_memory",
  "brain_plugins",
  "brain_runtime",
  "brain_scheduler",
  "brain_tools",
  "commander",
  "config",
  "core",
  "data",
  "data_datasets",
  "data_ingestion",
  "data_quality",
  "data_repository",
  "debate",
  "evaluation",
  "llm_gateway",
  "llm_router",
  "meetings",
  "memory",
  "optimization",
  "trading",
  "train",
  "web_server",
]
