        min: 0.02
        max: 0.1
    penalties:
      upper_bb:
        min: 0.0
        max: 0.2
      insufficient_drop_5d:
        min: 0.0
        max: 0.2
      insufficient_drop_20d:
        min: 0.0
        max: 0.2
      high_volatility:
        min: 0.0
        max: 0.2
      overheat_rsi:
        min: 0.0
