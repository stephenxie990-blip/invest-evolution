      min: 0.02
      max: 0.1
    take_profit_pct:
      min: 0.06
      max: 0.2
    position_size:
      min: 0.05
      max: 0.25
    oversold_rsi:
      min: 25
      max: 45
    rebound_rsi_cap:
      min: 50
      max: 70
    min_reversion_score:
      min: 0.01
      max: 0.2
  scoring:
    weights:
      oversold_rsi:
        min: 0.1
        max: 0.8
      lower_bb:
        min: 0.05
        max: 0.4
      drop_5d:
        min: 0.05
        max: 0.4
      drop_20d:
        min: 0.05
        max: 0.3
      bearish_trend_bonus:
        min: 0.0
        max: 0.2
      volume_ratio_bonus:
        min: 0.0
        max: 0.2
    bands:
