name: mean_reversion_v1
kind: mean_reversion
params:
  candidate_pool_size: 100
  top_n: 4
  max_positions: 3
  cash_reserve: 0.45
  stop_loss_pct: 0.04
  take_profit_pct: 0.1
  trailing_pct: 0.06
  position_size: 0.15
  oversold_rsi: 32
  rebound_rsi_cap: 57
  max_5d_drop: -3.0
  max_20d_drop: -7.0
  min_reversion_score: 0.12
  oscillation_max_positions: 1
  oscillation_cash_reserve_floor: 0.65
  oscillation_stop_loss_pct: 0.03
  oscillation_take_profit_pct: 0.06
  oscillation_trailing_pct: 0.04
  oscillation_min_reversion_score: 0.24
  oscillation_entry_5d_ceiling: 0.0
  oscillation_max_5d_drop_guard: -6.0
  oscillation_max_20d_drop_guard: -9.0
  oscillation_max_bb_pos_guard: 0.18
  oscillation_max_volatility_guard: 0.028
  oscillation_bear_trend_rsi_cap: 24
regime_profiles:
  oscillation:
    params:
      max_positions: 1
      cash_reserve_floor: 0.65
      min_reversion_score: 0.24
    risk:
      stop_loss_pct: 0.03
      take_profit_pct: 0.06
      trailing_pct: 0.04
    filters:
      entry_5d_ceiling: 0.0
      max_5d_drop_guard: -6.0
      max_20d_drop_guard: -9.0
      max_bb_pos_guard: 0.18
      max_volatility_guard: 0.028
      bear_trend_rsi_cap: 24
risk:
  stop_loss_pct: 0.04
  take_profit_pct: 0.1
  trailing_pct: 0.06
execution:
  initial_capital: 100000
  commission_rate: 0.00025
  stamp_tax_rate: 0.0005
  slippage_rate: 0.002
summary_scoring:
  weights:
    change_5d: 0.15
    change_20d: 0.15
    ma_bull: 0.20
    ma_bear: -0.10
    rsi_mid: 0.15
    rsi_oversold: 0.05
    rsi_overbought: -0.10
    macd:
      gold_cross: 0.20
      bullish: 0.10
      neutral: 0.00
      bearish: -0.10
      death_cross: -0.15
    bb_low: 0.15
    bb_high: -0.10
  logic:
    ma_bull_ratio: 1.01
    ma_bear_ratio: 0.99
  bands:
    change_5d_norm: 10.0
    change_20d_norm: 20.0
    rsi_mid_low: 40.0
    rsi_mid_high: 60.0
    rsi_oversold: 30.0
    rsi_overbought: 70.0
    bb_low: 0.30
    bb_high: 0.80

market_hints:
  avg_volatility_gt: 0.035
  market_breadth_lt: 0.35
  avg_change_20d_gt: 6.0

market_regime:
  bull_avg_change_20d: 3.0
  bull_above_ma20_ratio: 0.55
  bear_avg_change_20d: -3.0
  bear_above_ma20_ratio: 0.45
  default_regime: oscillation

benchmark:
  risk_free_rate: 0.03
  criteria:
    excess_return: 0.0
    sharpe_ratio: 0.8
    max_drawdown: 12.0
    calmar_ratio: 1.2
    win_rate: 0.45
    profit_loss_ratio: 1.2
    monthly_turnover: 4.0
risk_policy:
  clamps:
    stop_loss_pct:
      min: 0.02
      max: 0.1
    take_profit_pct:
      min: 0.06
      max: 0.2
    position_size:
      min: 0.05
      max: 0.25
  dynamic_stop:
    atr_period: 14
    stop_loss_atr_multiplier: 1.8
    take_profit_atr_multiplier: 2.2
    trailing_atr_multiplier: 1.2
  portfolio:
    max_drawdown_to_reduce: 0.06
    max_drawdown_to_close: 0.1
    market_ma_period: 60
    bull_threshold: 1.06
    bear_threshold: 0.96
    max_industry_pct: 0.25
    max_correlation: 0.55
  emergency:
    single_stock_crash_pct: -6.0
    rapid_loss_pct: -4.5
    rapid_loss_days: 3
    crash_severity_divisor: 12.0
    tighten_stop_severity_threshold: 0.55
    rapid_loss_severity_divisor: 9.0
    reduce_all_severity_threshold: 0.65
    all_positions_red_severity: 0.55
evaluation_policy:
  weights:
    signal_accuracy: 0.25
    timing: 0.25
    risk_control: 0.5
  defaults:
    empty_signal_score: 0.5
    empty_timing_score: 0.5
    empty_risk_score: 0.6
    risk_control_base_score: 0.35
  thresholds:
    signal_accuracy_low: 0.42
    timing_low: 0.45
    risk_control_low: 0.5
    win_rate_low: 0.42
    win_rate_high: 0.58
    high_trade_count: 18
train:
  freeze_total_cycles: 10
  freeze_profit_required: 7
  max_losses_before_optimize: 3
  auto_apply_mutation: false
  promotion_gate:
    min_samples: 3
    research_feedback:
      min_sample_count: 5
      blocked_biases: [tighten_risk, recalibrate_probability]
      max_brier_like_direction_score: 0.25
      horizons:
        T+20:
          min_hit_rate: 0.45
          max_invalidation_rate: 0.30
          min_interval_hit_rate: 0.40
    regime_validation:
      min_distinct_regimes: 2
      min_samples_per_regime: 1
      min_avg_return_pct: 0.0
      min_win_rate: 0.40
      min_benchmark_pass_rate: 0.40
      max_dominant_regime_share: 0.75
    return_objectives:
      min_avg_return_pct: 0.0
      min_median_return_pct: 0.0
      min_cumulative_return_pct: 0.0
      min_win_rate: 0.50
      max_loss_share: 0.50
      min_benchmark_pass_rate: 0.50
    candidate_ab:
      required_when_candidate_present: true
      require_candidate_outperform_active: true
      min_return_lift_pct: 0.0
      min_strategy_score_lift: 0.0
      min_benchmark_lift: 0.0
  freeze_gate:
    avg_return_gt: 0.0
    avg_sharpe_gte: 0.7
    avg_max_drawdown_lt: 12.0
    benchmark_pass_rate_gte: 0.55
    governance:
      max_candidate_pending_count: 0
      max_override_pending_count: 0
      max_active_candidate_drift_rate: 0.0
  quality_gate_matrix:
    review:
      min_strategy_score: 0.45
      min_benchmark_pass_rate: 0.05
      max_drawdown_pct: 18.0
    routing:
      min_score: 0.0
      min_avg_return_pct: 0.0
      min_avg_strategy_score: 0.0
      min_benchmark_pass_rate: 0.0
      max_avg_drawdown: 15.0
      allowed_deployment_stages: [active]
    promotion:
      max_pending_cycles: 3
      max_pending_candidates: 1
      max_override_cycles: 2
      allowed_deployment_stages: [candidate]
review_policy:
  confidence:
    default: 0.5
  param_clamps:
    cash_reserve:
      min: 0.0
      max: 0.8
    trailing_pct:
      min: 0.03
      max: 0.2
  agent_weight:
    min: 0.3
    max: 2.0
    default: 1.0
    min_traded_count: 3
    formula_base: 0.5
  fallback:
    strategy:
      win_rate_low: 0.4
      avg_return_low: -3.0
      confidence: 0.4
    evo:
      win_rate_conservative: 0.35
      win_rate_aggressive: 0.65
      conservative_adjustments:
        stop_loss_pct: 0.03
        position_size: 0.15
      aggressive_adjustments:
        position_size: 0.25
      confidence: 0.4

agent_weights:
  trend_hunter: 0.8
  contrarian: 1.2
context:
  style: concise
scoring:
  weights:
    oversold_rsi: 0.35
    lower_bb: 0.2
    drop_5d: 0.2
    drop_20d: 0.15
    bearish_trend_bonus: 0.0
